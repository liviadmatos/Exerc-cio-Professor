<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 2</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="script.js"></script>

</head>
<body>
    <main>
        <div class="bg-zinc-950 min-h-screen flex items-center justify-center p-4 text-white font-sans"> 
            <div class="border-2 border-zinc-400 rounded-3xl p-8 max-w-2xl w-full bg-zinc-800">
                <a href="../index.html" class="inline-flex items-center text-zinc-300 hover:text-white transition mb-4">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Voltar ao Início
                </a>
                <h1 class="text-3xl text-center mb-4">Calculadora de Aumento Salarial</h1>
                <p class="text-zinc-200 text-sm mb-8 text-center">Informe o salário do funcionário e calcule o aumento conforme sua faixa salarial</p>
            
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    
                    <section class="space-y-6">
                        <div>
                            <label for="" class="block mb-2">Salário Atual</label>
                            <input type="number" id="salarioAtual" placeholder="Digite o salário" class="w-full bg-zinc-600 border-2 border-zinc-800 rounded-md p-2 outline-none focus:border-white transition">
                        </div>
                        <div class="p-3 bg-zinc-700 rounded-md text-sm text-zinc-300 border-l-4 border-green-500">
                            <p class="font-semibold mb-2">Tabela de Aumento:</p>
                            <ul class="space-y-1">
                                <li>Até R$ 1.200,00: <strong class="text-green-400">16%</strong></li>
                                <li>R$ 1.200,01 - R$ 2.100,00: <strong class="text-green-400">13%</strong></li>
                                <li>R$ 2.100,01 - R$ 3.000,00: <strong class="text-green-400">10%</strong></li>
                                <li>Acima de R$ 3.000,00: <strong class="text-green-400">5%</strong></li>
                            </ul>
                        </div>
                    </section>
                    <section class="space-y-6 flex flex-col">
                        <div>
                            <label for="" class="block mb-2">Valor do Aumento</label>
                            <div class="border-2 border-zinc-600 rounded-md p-3 bg-zinc-700 text-lg font-bold text-green-400">
                                <span id="valorAumento">R$ 0,00</span>
                            </div>
                        </div>
                        <div>
                            <label for="" class="block mb-2">Novo Salário</label>
                            <div id="novoSalario" class="flex-grow border-2 border-zinc-600 rounded-3xl p-4 bg-zinc-700 flex items-center justify-center text-xl font-bold text-green-400">R$ 0,00</div>
                        </div>
                        <button onclick="calcular()" class="mt-4 bg-green-900 hover:bg-green-700 border-2 border-green-500 text-white font-bold py-2 px-6 rounded-full">Calcular</button>
                    </section>
                    <div id="relogio"></div>
            </div>
        </div>
    </main>

    
</body>
</html>
