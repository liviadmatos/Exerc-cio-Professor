<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercício 1</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
   <script src="script.js"></script>
</head>
<body>
    <main>
        <div class="bg-zinc-950 min-h-screen flex items-center justify-center p-4 text-white font-sans"> 
            <div class="border-2 border-zinc-400 rounded-3xl p-8 max-w-2xl w-full bg-zinc-800">
                <a href="../index.html" class="inline-flex items-center text-zinc-300 hover:text-white transition mb-4">
                    <svg class="w-5 h-5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
                    </svg>
                    Voltar ao Início
                </a>
                <h1 class="text-3xl text-center mb-4">Calculadora de Horas Extras</h1>
                <p class="text-zinc-200 text-sm mb-8 text-center">Para efetuar o cálculo de horas extras, insira as informações abaixo e clique em calcular </p>
                <!--área principal com colunas-->
                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <!--área de inputs-->
                    <section class="space-y-6">
                        <div>
                            <label for="" class="block mb-2">Salário Bruto</label>
                            <input type="number" id="salario" placeholder="salário bruto" class="w-full bg-zinc-600 border-2 border-zinc-800 rounded-md p-2 outline-none focus:border-white transition">
                        </div>
                        <div>
                            <label for="">Horas Extras (dias normais)</label>
                            <input type="number" id="horasNormais" placeholder="quantidade de horas" class="w-full bg-zinc-600 border-2 border-zinc-800 rounded-md p-2 outline-none focus:border-white transition">
                        </div>
                        <div>
                            <label for="">Horas Extras  (finais de semana)</label>
                            <input type="number" id="horasFinalSemana" placeholder="quantidade de Horas Finais de Semana" class="w-full bg-zinc-600 border-2 border-zinc-800 rounded-md p-2 outline-none focus:border-white transition">
                        </div>
                    </section>
                    <section class="space-y-6 flex flex-col">
                        <label for="" class="block mb-2">Resultado</label>
                        <div id="resultado" class="flex-grow border-2 border-zinc-600 rounded-3xl p-4 bg-zinc-700 flex items-center justify-center text-xl font-bold text-green-400">Resposta</div>
                        <button onclick="calcular()" class="mt-4 bg-green-900 hover:bg-green-700 border-2 border-green-500 text-white font-bold py-2 px-6 rounded-full">Calcular</button>
                    </section>
            </div>
        </div>
    </main>

</body>
</html>
